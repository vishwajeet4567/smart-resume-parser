{% extends "base.html" %}
{% block title %}Edit Job | Smart ATS Portal{% endblock %}
{% block content %}

<section class="hero fade-up">
  <h1>Edit Job</h1>
  <p>Update the details for this job posting.</p>
</section>

<section class="card fade-up" style="max-width: 720px; margin: 0 auto;">
  <form method="POST" action="/recruiter/jobs/{{ job['id'] }}/edit">

    <div class="form-group">
      <label for="title">Job Title <span class="req">*</span></label>
      <input
        id="title"
        name="title"
        type="text"
        class="form-input"
        value="{{ job['title'] }}"
        placeholder="e.g. Senior Python Developer"
        required
      />
    </div>

    <div class="form-group">
      <label for="description">Job Description <span class="req">*</span></label>
      <textarea
        id="description"
        name="description"
        class="form-input"
        rows="10"
        placeholder="Describe the role, responsibilities, and requirements..."
        required
      >{{ job['description'] or '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="skills">Required Skills <span style="opacity:.6">(comma-separated)</span></label>
      <input
        id="skills"
        name="skills"
        type="text"
        class="form-input"
        value="{{ job['skills'] or '' }}"
        placeholder="e.g. Python, Flask, REST APIs, SQL"
      />
    </div>

    <div class="job-actions" style="margin-top: 1.5rem;">
      <button type="submit" class="btn-primary">Save Changes</button>
      <a class="btn-outline" href="/recruiter/jobs/{{ job['id'] }}">Cancel</a>
    </div>
  </form>
</section>

<style>
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
  .form-group label { font-weight: 600; font-size: 0.95rem; }
  .form-input {
    width: 100%; padding: 0.65rem 0.9rem; border-radius: 8px;
    border: 1px solid var(--border, #334155); background: var(--card-bg, #0f172a);
    color: var(--text, #e2e8f0); font-size: 1rem; box-sizing: border-box;
    transition: border-color 0.2s;
  }
  .form-input:focus { outline: none; border-color: var(--accent, #6366f1); }
  textarea.form-input { resize: vertical; }
  .req { color: #ef4444; }
</style>
{% endblock %}
